<!DOCTYPE html>
<html lang='en'>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anki ARV v 3.0</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css?v=3.1.1">
  </head>
  <body>
     <header> 
      <h1>ANKI ARV <span style="font-size: 0.8rem; vertical-align: middle; color: var(--neon-blue); border: 1px solid var(--neon-blue); padding: 2px 5px; border-radius: 3px; margin-left: 10px;">V3.0</span></h1>

       <section class="user-profile">
         <section class="stats">
           <p>Cards in deck: <span id="total-cards"></span></p>
         </section>
         <input type="text" id="user-input" placeholder="Pilot Name...">
         <button id="login-btn">Sync System</button>
         <h3>Active Pilot: <span id="display-name">Guest</span></h3>
       </section>
     </header>
     
     <main>
       <section id="admin-panel">
         <input type="text" id="quest-input" placeholder="Enter Question...">
         <input type="text" id="ans-input" placeholder="Enter Answer...">
         <input type="text" id="sector-input" placeholder="Pilot Sector... (Enter your Data Dimension)">
         <button id= "add-btn">Add To Deck</button>
       </section>
       
      <hr>

      <div class="dimension-gate">
        <small style="color: var(--neon-blue); font-size: 0.7rem; letter-spacing: 1px;">ACTIVE SECTOR:</small>
        <nav id="sector-nav">
          </nav>
      </div>
        <div style="text-align: center; margin: 20px 0;">
          <button onclick="showNextDueCard(); openDeckView()" class="active-sector-btn" style="padding: 15px 40px;">
            ENGAGE REVIEW ⚡️
          </button>
        </div>  
      <div id="deck-modal" class="modal-overlay" style="display:none;">
        <div class="flashcard-stage" onclick="toggleFlip(event)">
            <div id="card-inner" class="card-inner">
                
              <div class="card-front">
                <button id="delete-btn" onclick="deleteCard(event)">🗑</button>
                
                
                <div id="show-answer" class="sector-btn">🦾 REVEAL TRUTH 🔄</div>
                <div id="edit-hint" onclick="editCurrentCard(event)">[TAP TO EDIT]</div>

                <h2 id="question-text">Sync system to start...</h2>
                <input type="text" id="answer-input" placeholder="Type answer if you know..."
                style="width: 80%; padding: 10px; margin: 15px auto; display: block; background: #1a1a1a; border: 1px solid var(--neon-blue); color: white; text-align: center;">
            </div>
            
    
                <div class="card-back">
                    <div id="answer-text" style="display:none"></div>
                    <div id="repetition-controls" style="display:none">
                      <button id="hard-btn" class="pill-btn">Hard (1d)</button>
                      <button id="good-btn" class="pill-btn">Good (3d)</button>
                      <button id="easy-btn" class="pill-btn">Easy (7d)</button>
                      <button id="omega-btn" class="pill-btn omega-pill">Alpha & Omega</button>
                    </div>
                </div>
    
            </div>
        </div>
        <div class="modal-footer">
        
          
            <button onclick="closeDeckView()" class="sector-btn">RETURN TO GARAGE</button>
        </div>
    </div>
    
    <footer>

      

      <hr style="margin: 20px 0; border: 0; border-top: 1px dashed #30363d;">

      <section id="system-tools">
        <button id="export-btn" title="Save deck to file">💾 Export</button>
        <input type="file" id="import-input" style="display:none" accept=".json">
        <button id="import-btn" title="Load deck from file">📥 Import</button>
      </section>

      <div id="star-gate-container" style="padding: 20px 0; border-top: 1px solid #222;">
        <button id="star-gate-btn">
          — STAR GATE —
        </button>
        
      </div>
    </footer>
    <div id="archive-list"></div>
     <script src="main.js?v=3.1.1"></script>
  </body>
</html>
